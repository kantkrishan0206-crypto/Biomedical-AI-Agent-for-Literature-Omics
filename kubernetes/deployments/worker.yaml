apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: biomedical-ai
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: worker:latest
          ports:
            - containerPort: 8080
