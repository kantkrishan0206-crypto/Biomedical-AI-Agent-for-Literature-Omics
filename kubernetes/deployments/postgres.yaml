apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: biomedical-ai
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:latest
          ports:
            - containerPort: 8080
