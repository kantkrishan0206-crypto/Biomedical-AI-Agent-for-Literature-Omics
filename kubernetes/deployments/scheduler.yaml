apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: biomedical-ai
spec:
  replicas: 1
  selector:
    matchLabels: { app: scheduler }
  template:
    metadata:
      labels: { app: scheduler }
    spec:
      containers:
        - name: scheduler
          image: scheduler:latest
          ports:
            - containerPort: 8080
