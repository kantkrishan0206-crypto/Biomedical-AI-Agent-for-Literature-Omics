apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biomedical-ai
  namespace: biomedical-ai
spec:
  rules:
    - host: biomedical-ai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
